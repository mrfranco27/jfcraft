<!DOCTYPE html>
<html>
<head>
    <title>JS Minecraft Clone</title>

    <style>
        @font-face {
            font-family: 'MinecraftMain';
            src: url('./assets/minecraft/fonts/general/minecraft.otf') format('opentype');
        }

        body, html {
            font-family: 'MinecraftMain', sans-serif;
            margin: 0;
            overflow: hidden;
            background: #78A7FF;
        }

        #game {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            mix-blend-mode: difference;
            filter: saturate(0) brightness(1.2);
            background: url('./assets/minecraft/textures/gui/sprites/hud/crosshair.png') no-repeat center;
            background-size: contain;
            image-rendering: pixelated;
            pointer-events: none;
        }

        #chatInput {
    position: absolute;
    bottom: 3px;           /* Distance from the bottom */
    left: 5px;             /* Distance from the left */
    width: 98.8%;           /* Typical MC chat width */
    height: 24px;
    background: rgba(0, 0, 0, 0.5); /* Semi-transparent black */
    border: none;
    outline: none;          /* Removes the focus ring */
    color: white;
    font-family: 'MinecraftMain', sans-serif; /* If you have the font */
    font-size: 20px;
    padding-left: 3px;
    z-index: 100;           /* Ensures it stays above the canvas */
    display: none;          /* Hidden by default */
}

    </style>
</head>

<body>

    <div id="crosshair"></div>

    <div id="info" style="position: absolute; top: 0; left: 0; color: white; background: rgba(0,0,0,0.5); padding-right: 5px; padding-left: 5px">
        Facing: <span id="dirfacing">N</span><br>
        XYZ: <span id="coords">0 / 0 / 0</span><br>
        Speed: <span id="speed">0.00</span> bps
    </div>

    <input id="chatInput">

    <canvas id="game"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>

    <!-- =========================
         1. WORLD / GENERATION
    ========================== -->
    <script src="biomes.js"></script>
    <script src="blockRegistry.js"></script> <!-- 👈 ADD THIS -->
    <script src="block.js"></script>
    <script src="worldgen.js"></script>

    <!-- =========================
         2. WORLD RENDER CORE
    ========================== -->
    <script src="world.js"></script>

    <!-- Player MODEL (visual only entity attachment) -->
    <script src="playermodel.js"></script>

    <!-- =========================
         3. ENTITY SYSTEM (NEW ARCH)
    ========================== -->
    <script src="entity.js"></script>

    <script src="entityLiving.js"></script>

    <!-- Physics applies to EntityLiving / EntityPlayer -->
    <script src="physics.js"></script>

    <!-- Control layer (INPUT + CAMERA + ACTIONS) -->
    <script src="controlPlayer.js"></script>

    <!-- Entity player (STATE ONLY) -->
    <script src="entityPlayer.js"></script>

    <!-- Entity NPC (STATE ONLY) -->
    <script src="entityNPC.js"></script>


    <script src="commands.js"></script>
    <script src="chat.js"></script>

    <!-- =========================
         4. GAME LOOP
    ========================== -->
    <script src="tick.js"></script>

    <!-- =========================
         5. UI SYSTEM
    ========================== -->
    <script src="button.js"></script>
    <script src="game_menu.js"></script>
    <script src="options_menu.js"></script>

</body>
</html>
